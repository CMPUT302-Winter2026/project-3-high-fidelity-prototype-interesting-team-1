<script type="text/javascript">
    angular.module('dictionaryApp.controllers',[])
        .controller('SearchController',['$scope','$rootScope','Data','$timeout','$location','$filter',function($scope,$rootScope,Data,$timeout,$location,$filter){
            var errorCallback = function (response) {
                angular.element('#loading').hide();
                console.log(response);
            };
            var timer = false;
            $rootScope.searchResults = {};
            $rootScope.isSearching =false;
            function init(){

                resetSearchResults();
                $scope.splitScreen = false;
                if($scope.search==undefined) $scope.search ={ language:'en', field:'key', where:'begin'};


                angular.element("#loading-anim").hide();


                $scope.initialized= true;
            }
            function resetSearchResults (){
                $rootScope.searchResults = {
                    keywords:[],
                    entries:[],
                    examples:[],
                    themes:[],
                    morphemes:[]
                };
                $scope.selectedResults = {};

            }
            function getSearchResultData(params,field){
                if(field==undefined)field=params.controller;
                Data.get(params,function successCallback(data) {
                    if( $rootScope.searchResults[field].length==0)$rootScope.searchResults[field]=data;
                    else {
                        $rootScope.searchResults[field][field]= $rootScope.searchResults[field][field].concat(data[field]);
                    }
					$rootScope.isSearching =false;
                    angular.element('#loading').hide();
                    angular.element("#search-anim").hide();
                    //console.log(field, $rootScope.searchResults[field]);
                }, errorCallback);
            }
            function postSearchResultData(params,field){
                var postData = {};
                var model =params.controller[0].toUpperCase()+params.controller.substr(1).replace(/ies$/,'y').replace(/s$/,'');
                postData[model]= $scope.search;
                Data.search(params,postData,function successCallback(data) {
                	console.log(field,data);
                    $rootScope.searchResults[data.varname]= $rootScope.searchResults[field]?$rootScope.searchResults[field].concat(data):data;
                    angular.element('#loading').hide();
                    angular.element("#search-anim").hide();
					$rootScope.isSearching =false;
                }, errorCallback);
            }
            if($scope.initialized == undefined) init();
            try{
                var offset=angular.element("#mainList").offset();

                //setup split screen
                if(offset!=undefined && screen.width>990){
                    angular.element("#mainList").css('height',(screen.availHeight-(offset.top+30))+"px");
                    angular.element("#tabs").css('min-height',(screen.availHeight-250)+"px");
                    $scope.splitScreen = true;
                    angular.element("#mainList").css('overflow-y','scroll');
                }
            }catch(err){console.log("screen height set failed",err);}

            $rootScope.doSearch = function(wait,event){
                $scope.currentEntry = $scope.currentEntryID = false;
                /* handle waiting for more typing */
                if(event )
                    if(event.charCode==13 ){
                        wait = false;
                    }else{
                        return;
                    }

                if(wait==false && $scope.search.type==undefined)$scope.search.type="en";
                if(wait && $scope.lastSearch!=undefined && angular.equals($scope.lastSearch,$scope.search)) return;

                if(wait || $scope.search.type==undefined){
                    //
                    if(timer)$timeout.cancel(timer);
                    timer = $timeout(function(){
                        $scope.doSearch(false);
                    },2500);
                    return;
                }
                if(timer)$timeout.cancel(timer);

                if($scope.search.text==undefined){
                    angular.element("#search-anim").hide();
                    return;
                }

                if($location.path().match("result")==null && $scope.search.text!=undefined && $scope.search.text.length>0)$location.path('/results');
                $scope.lastSearch=angular.copy($scope.search);
                /* select results tab */
                try{
                    $timeout(function(){
                        angular.element("#tabs ul li ").removeClass('active');
                        angular.element("#tabs ul li.result ").addClass('active');
                    },0);
                }catch(err){ console.log("error",err);}
                angular.element("#search-anim").show();
                //angular.element("#search-anim").show();

                //clear all current results
                resetSearchResults();
				$rootScope.isSearching = true;
                console.log($scope.search);

                if($scope.search.type.match("cr")!=null){
                    var params = {controller:'entries',action:'search',searchText:$scope.search.text};
                    getSearchResultData(params);

                    params.controller='morphemes';
                    getSearchResultData(params);


                    params.controller='examples';
                    getSearchResultData(params);




                }else if($scope.search.type.match("en")!=null){
                    //console.log("sense search");
                    var params = {controller:'keywords',action:'search',searchText:$scope.search.text};
                    getSearchResultData(params);



                }else{
                    //$scope.search.search = $scope.search.text;
                    //console.log($scope.search);
                    var params = {controller:'entries',action:'search'};

                    if($scope.search.language=="cree" || $scope.search.language=="all"){
                        if($scope.search.field=='key' || $scope.search.field == 'all'){
                            postSearchResultData(params)
                        }
                        if($scope.search.field=='key' ||$scope.search.field=='morpheme' || $scope.search.field == 'all'){
                            params.controller='morphemes';
                            postSearchResultData(params);

                        }
                        if($scope.search.field=='example' || $scope.search.field == 'all'){
                            params.controller = 'examples';
                            postSearchResultData(params);
                        }
                    }
                    if($scope.search.language=="en" || $scope.search.language=="all"){
                        if($scope.search.field=='key' || $scope.search.field == 'all'){
                            params.controller="keywords";
                            postSearchResultData(params);
                        }
                        if($scope.search.field=='def' || $scope.search.field == 'all'){
                            params.controller = 'entries';
                            postSearchResultData(params);
                        }
                        if($scope.search.field=='theme' || $scope.search.field == 'all'){
                            params.controller = 'themes';
                            postSearchResultData(params);
                        }

                    }
                }

            };

            $rootScope.toggleSearchResultDetail = function(field,index){
                var className = $rootScope.searchResults[field].classname;
                console.log('toggleSearchResultDetail',field,index,className,$rootScope.searchResults[field]);
                $scope.selectedResults[field]=$rootScope.searchResults[field][field][index][className].uuid;
                if($rootScope.searchResults[field][field][index].data==undefined){
                    var params = {controller:field,uuid:$scope.selectedResults[field], action:'view'};
                    angular.element("#loading").show();
                    Data.get(params,function succesCallBack(data) {
                        $rootScope.searchResults[field][field][index].data = data[data.varname];
                        $rootScope.searchResults[field][field][index].visible=true;
                        if(field=='entries'){
                            $scope.currentEntry = data.entry;
                            $scope.currentEntryID = $scope.currentEntry.Entry.uuid;
                        }
                        angular.element("#loading").hide();
                    }, errorCallback())
                }else{
                    if(field=='entries'){
                        $scope.currentEntry = $rootScope.searchResults[field][field][index].data;
						if($scope.currentEntryID==$scope.currentEntry.Entry.uuid)
						$rootScope.searchResults[field][field][index].visible=!$rootScope.searchResults[field][field][index].visible;
						$scope.currentEntryID = $scope.currentEntry.Entry.uuid;
                    }
                }

            };

            $rootScope.toggleSearchResultEntryDetail = function(field,index,eIndex){

                if($rootScope.searchResults[field][field][index].data.Entry[eIndex].data==undefined){
                    var params = {controller:'entries',uuid:$rootScope.searchResults[field][field][index].data.Entry[eIndex].uuid, action:'view'};
                    angular.element("#loading").show();
                    Data.get(params,function succesCallBack(data) {
                        $rootScope.searchResults[field][field][index].data.Entry[eIndex].data = data[data.varname];
                        $rootScope.searchResults[field][field][index].data.Entry[eIndex].visible=true;
                        $scope.currentEntry = data.entry;
                        $scope.currentEntryID = $scope.currentEntry.Entry.uuid;
                        angular.element("#loading").hide();
                    }, errorCallback())
                }else{
					$scope.currentEntry = $rootScope.searchResults[field][field][index].data.Entry[eIndex].data;
					if($scope.currentEntryID==$scope.currentEntry.Entry.uuid)
                    $rootScope.searchResults[field][field][index].data.Entry[eIndex].visible=!$rootScope.searchResults[field][field][index].data.Entry[eIndex].visible;

                    $scope.currentEntryID = $scope.currentEntry.Entry?$scope.currentEntry.Entry.uuid:$scope.currentEntry.uuid;
                }

            };

            /*DELETE*/






            $scope.$on('$destroy',function(event){
                if(timer)$timeout.cancel(timer);
            });
            init();
            $scope.loadingImg = angular.element('#loading').attr('src');
    }])
        .controller('EntryDetailController',['$rootScope','$scope','$routeParams','Data',function($rootScope,$scope,$routeParams,Data){
            $scope.words = {};
            var uuid = $routeParams.uuid;
            //console.log(uuid,$routeParams);

            Data.get({controller:'entries', action:'view',uuid:uuid},function(data){
                $scope.data = data.entry;
            });




        }])
        .controller('HelpController',['$scope', function($scope){
                angular.element("#loading-anim").hide();
                angular.element("#tabs ul li ").removeClass('active');
                angular.element("#tabs ul li.help ").addClass('active');
                if($scope.search==undefined) $scope.search ={ language:'en', field:'key', where:'begin'};
                $scope.doSearch = function(auto){
                    $location.path('/results');
                };
            }]

        ).controller('CreditsController',['$scope', function($scope){
            angular.element("#loading-anim").hide();
            angular.element("#tabs ul li ").removeClass('active');
            angular.element("#tabs ul li.credits ").addClass('active');
            if($scope.search==undefined) $scope.search ={ language:'en', field:'key', where:'begin'};
            $scope.doSearch = function(auto){
                $location.path('/results');
            };
        }]

    )   .controller('BrowseController',['$rootScope','$scope','Data',function($rootScope,$scope,Data){
            $rootScope.browse = {
                keywords:   [],
                entries:    [],
                themes:     [],
                morphemes:  [],
                ps:  [],
                currentPage: {Entry:1,Keyword:1, Theme:1, Ps:1, Morpheme:1},
                currentTile: {Entry:false,Keyword:false, Theme:false, Ps:false, Morpheme:false}
            };
        var errorCallback = function (response) {
            angular.element('#loading').hide();
            console.log(response);
        };

        angular.element("#tabs ul li ").removeClass('active');
            angular.element("#tabs ul li.browse ").addClass('active');
            $scope.pageChanged = function (model, controller) {
                angular.element("#loading-anim").show();
                if(controller==undefined) controller =model.replace(/y$/,'ies').replace(/([^as])$/,'$1s').toLocaleLowerCase();
                var params ={controller:controller, action:'index',page:'page:'+$rootScope.browse.currentPage[model]};
                if($rootScope.browse.currentTile[model])params.uuid=$rootScope.browse.currentTile[model];
                Data.get(params,function successCallBack(data){
                    $rootScope.browse[controller] = data;
                    if(controller=='entries'){
                        $rootScope.browse[controller].tiles.splice(0,0,"a");
                        $rootScope.browse[controller].tiles.splice(5,0,"i");
                        $rootScope.browse[controller].tiles.splice(10,0,"o");
                    }
                    angular.element("#loading-anim").hide();
                }, errorCallback);
            };
            $rootScope.toggleBrowseDetail = function(field,index){
                //console.log('toggleBrowseDetail',field,index,$rootScope.browse[field]);
                var model = $rootScope.browse[field].classname;
                //console.log('toggleBrowseDetail',field,index,model,$rootScope.browse[field]);

                if($rootScope.browse[field][field][index].data==undefined){
                    var params = {controller:field,uuid:$rootScope.browse[field][field][index][model].uuid, action:'view'};
                    angular.element("#loading").show();
                    Data.get(params,function succesCallBack(data) {
                        $rootScope.browse[field][field][index].data = data[data.varname];
                        $rootScope.browse[field][field][index].visible=true;

                        angular.element("#loading").hide();
                    }, errorCallback())
                }else{
                    $rootScope.browse[field][field][index].visible=!$rootScope.browse[field][field][index].visible;

                }

            };

            $rootScope.toggleBrowseEntryDetail = function(field,index,eIndex){

                if($rootScope.browse[field][field][index].data.Entry[eIndex].data==undefined){
                    var params = {controller:'entries',uuid:$rootScope.browse[field][field][index].data.Entry[eIndex].uuid, action:'view'};
                    angular.element("#loading").show();
                    Data.get(params,function succesCallBack(data) {
                        $rootScope.browse[field][field][index].data.Entry[eIndex].data = data[data.varname];

<script type="text/javascript">

    angular.module('dictionaryApp.filters',[])

        .filter('trustedResource',[ '$sce', function($sce){
            return function(val){
                if(val)
                    return $sce.trustAsResourceUrl(val);
                return val;
            }
        }
        ])
        .filter('html',[ '$sce', function($sce){
            return function(val){
                if(angular.isString(val))
                    return $sce.trustAsHtml(val.replace(/\\r\\n/g,"<br/>"));
                return $sce.trustAsHtml("");

            }
        }
        ])

        .filter('intval',[  function(){
            return function(val){
                if(val)
                    return parseInt(val,10);
                return 0;
            }
        }
        ])
        .filter('toJSON',[function(){
            return function(val){

                console.log(angular.fromJson(val));
                return angular.fromJson(val);
            }
        }])
        .filter('in_array',[function(){
            return function(data, key){

                if(data)
                    return data.indexOf(key)>-1;
                return false;
            }
        }])
        .filter('keys',[function(){
            return function(data){

                if(data)
                    return Object.keys(data);
                return array();
            }
        }])
        .filter('sortArray', function(){
            return function(inputArray){
                console.log(inputArray);
                return inputArray? inputArray.sort():inputArray;
            }
        })
        .filter('isString',[function(){
            return function(data){
                return angular.isString(data);
            }
        }])
        .filter('isArray',[function(){
            return function(data){
                return angular.isArray(data);
            }
        }])
        .filter('isObject',[function(){
            return function(data){
                return angular.isObject(data);
            }
        }])

        .filter('display1N',[function(){
            return function(data,model,displayFields){

                if(angular.isObject(data) &&model && displayFields && angular.isObject(data)){
                    model=model.replace('Parent','').replace('Child','');
                    try{


                        var key = displayFields[model];
                        //console.log(model,key,meta);
                        if(key ){
                            key=key.replace(model+".","");

                        }
                        if(key && data[key]!=undefined){
                            key=key.replace(model+".","");
                            return data[key];
                        }else{
                            key = model.toLowerCase();
                            if(data[key]) return data[key];
                            key = model.toLowerCase();
                            if(data['name_en']) return data['name_en'];
                        }
                    }catch(err){
                        console.log("display1N error",data,model,meta,err);
                    }

                }



                return "";
            }
        }])

        .filter('displayMN',[function(){
            return function(data,model,displayFields){
                //console.log("displayMN",data,model,meta);
                if(angular.isArray(data) && data.length>0&& model && displayFields){
                    try{
                        var key = displayFields[model];
                        var value = "";
                        if(key){
                            key=key.replace(model+".","");

                        }
                        if(key==undefined || data[0][key]==undefined){

                            key = model.toLowerCase();
                            if(data[0][key]==undefined){
                                key = key.replace("parent","").replace("child","");
                                if(data[0][key]==undefined){
                                    key ='name_en';
                                    if(data[0][key]==undefined) key=false;
                                }
                            }

                        }
                        //console.log(data,model,key);
                        if(key)
                            for(var i in data)
                                value+=(value.length?", ":"")+data[i][key];
                        return value;
                    }catch (err){
                        console.log("displayMN error",data,model,displayFields,err);
                    }
                }

                return "";
            }
        }])

        .filter('id_in_data',[function(){
            return function(data, val){
                if(val==undefined) return false;
                if(data){
                    for(var r in data){
                        if(data[r].id==val)return true;
                    }
                }

                return false;
            }
        }])
        .filter('value_of_path',[function(){
            return function(data, key){
                // console.log(data,key);
                if(data!=undefined && key!=undefined){
                    var paths = key.split(".");
                    //console.log(data,paths);
                    var value = data;
                    for(var p in paths){
                        value =value[paths[p]];
                        if(value==undefined) return null;
                    }
                    return value;
                }

                return null;
            }
        }])
        .filter('abbreviate',[function(){
            return function(val){
                if(val){
                    if(val.match(" ")==null) return val[0];
                    var abbr = "";
                    var split = val.split(" ");
                    //console.log(split);
                    for(var i in split)abbr+=split[i][0];
                    return abbr;
                }
                return val;
            }
        }])
        .filter('highlight_search_text',['$sce',function($sce){
            return function(val,searchText){
                try{
                    if(val && val.length && searchText && searchText.length){
                        var searchHighlight= "<mark>"+searchText+"</mark>";//"<span style='text-decoration: underline; font-weight:bold; background-color: #ffc'>"+searchText+"</span>";
                        return val.replace(searchText, searchHighlight);//$sce.trustAsHtml(val.replace(searchText, searchHighlight));
                    }
                    else if(val && val.length) return val; $sce.trustAsHtml(val);
                }catch(err){
                    console.log('highlight_search_text',val);
                }
                console.log('highlight_search_text error',val,searchText);
                return val;
            }
        }])
        .filter('jsonToTable',['$sce',function($sce){
            return function(val){

                try{

                    if(val  ){
                        var json = angular.isObject(val)?val:angular.fromJson(val);
                        var returnText = "";
                        var table='<table class=" "> ';
                        for(var k in json){
                            if(json[k] && json[k].length && json[k].indexOf("--")==-1  )//returnText+=k+': '+json[k]+"\r\n";
                                table+=' <tr><th>'+ k[0].toUpperCase()+ k.substr(1).replace('_',' ')+': </th> <td style="padding-left: 1em;" class="text-left">'+json[k]+'</td></tr>';
                        }
                        return table+'</table>';//returnText;//$sce.trustAsHtml();//val.replace(searchText, searchHighlight));
                    }

                }catch(err){
                    console.log('toTable',val, err);
                }
                //console.log('toTable error',val,angular.isObject(val) );
                return val;
            }
        }])
		.filter('expandSummary',[function () {
			return function (val) {
				var text = val;
				if(val && val.indexOf("::")>-1){
					var parts = val.split("::");
					text = '<strong>'+parts.shift()+'</strong>';
					if(parts.length>1)text+=" <em class='small'>"+parts.shift()+"</em>";
					text+='<small class="small">'+parts.join(" ")+'</small>';
				}
				return text;
			}
		}])

    ;
</script>

	function previewImage(img){
		var meta =$(img).data('meta');
		$("#imgPreviewModalImage").attr('src',img.src);
		$("#imgPreviewModalLabel").text(meta.orthography.replace(/_/g,' '));

		var table='<table style="color:white;" class=" table"> ';
		var json = $.parseJSON(meta.source);
		for(var k in json){
			if(json[k] && json[k].length && json[k].indexOf("--")==-1  )//returnText+=k+': '+json[k]+"\r\n";
				table+=' <tr><th>'+ k[0].toUpperCase()+ k.substr(1).replace('_',' ')+': </th> <td style="padding-left: 1em;" class="text-left">'+json[k]+'</td></tr>';
		}
		table+='</table>';
		$("#imgPreviewModalNote").html((meta.public_note_en?'<p>'+meta.public_note_en+'</p>':'')+table);
		$("#imgPreviewModal").modal('show');
		console.log(json);
	}
